name: frontend-ci (build)

on:
  workflow_dispatch:
  push:
    branches: [ main, master, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, master, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build_and_analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write


    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install
        run: npm ci

      - name: Lint (optional)
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "Nessuno script lint: salto."
          fi

      - name: Test (optional)
        run: |
          if npm run | grep -q "test"; then
            npm test -- --ci --reporters=default --reporters=jest-junit
          else
            echo "Nessuno script test: salto."
          fi

      - name: Build
        run: npm run build

